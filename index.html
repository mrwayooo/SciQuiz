<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Science Quiz - พร้อมเฉลยละเอียด</title>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
<style>
/* ===== RESET & BASE ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kanit',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0f172a,#020617);
    color:white;
    padding: 20px;
}

/* ===== MAIN CONTAINER ===== */
.container{
    width:650px;
    max-width:100%;
    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(15px);
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
    animation:fadeIn 0.6s ease;
}

h1{ text-align:center; font-size:32px; margin-bottom:25px; }
h2{ margin-bottom:20px; line-height: 1.4; }
h3{ margin-bottom:10px; color:#cbd5f5; }

/* ===== BUTTONS ===== */
.menuBtn{
    background:linear-gradient(45deg,#6366f1,#4f46e5);
    color:white;
    border:none;
    padding:14px 24px;
    margin:10px 5px;
    border-radius:12px;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:all 0.25s ease;
}

.menuBtn:hover:not(:disabled){
    transform:translateY(-3px) scale(1.05);
    box-shadow:0 10px 25px rgba(99,102,241,0.6);
}

.menuBtn:disabled {
    background: #475569;
    cursor: not-allowed;
    opacity: 0.6;
}

/* ===== QUIZ CHOICES ===== */
.choice{
    display:block;
    width:100%;
    background:rgba(255,255,255,0.05);
    border:2px solid rgba(255,255,255,0.08);
    padding:16px;
    border-radius:12px;
    margin:12px 0;
    font-size:16px;
    color:white;
    cursor:pointer;
    text-align: left;
    transition:all 0.2s ease;
}

.choice:hover:not(.locked){
    background:rgba(99,102,241,0.15);
    border-color:#6366f1;
}

.choice.selected{ border-color:#facc15; background:rgba(250,204,21,0.1); }
.choice.correct{ background:#22c55e !important; border-color:#22c55e !important; color: white; }
.choice.wrong{ background:#ef4444 !important; border-color:#ef4444 !important; color: white; }

/* ===== EXPLANATION BOX ===== */
#explanationBox {
    margin-top: 20px;
    padding: 20px;
    background: rgba(99, 102, 241, 0.1);
    border-left: 4px solid #6366f1;
    border-radius: 8px;
    display: none;
    animation: slideIn 0.4s ease;
}

#explanationBox b { color: #facc15; }

/* ===== PROGRESS BAR ===== */
.progress{ width:100%; height:12px; background:rgba(255,255,255,0.08); border-radius:20px; margin-bottom:25px; overflow:hidden; }
.progress-bar{ height:100%; width:0%; background:linear-gradient(90deg,#22c55e,#4ade80); transition:width 0.4s ease; }

/* ===== UTILITIES ===== */
.hidden{ display:none; }
@keyframes fadeIn{ from{opacity:0; transform:translateY(15px);} to{opacity:1; transform:translateY(0);} }
@keyframes slideIn{ from{opacity:0; transform:translateX(-10px);} to{opacity:1; transform:translateX(0);} }

</style>
</head>
<body>

<div class="container">
    <div id="menu">
        <h1>Science Quiz</h1>
        <p style="text-align:center; margin-bottom:20px; color:#94a3b8;">เลือกวิชาที่ต้องการทดสอบ (25 ข้อ)</p>
        <div style="display:flex; justify-content:center;">
            <button class="menuBtn" onclick="startGame('physics')">ฟิสิกส์</button>
            <button class="menuBtn" onclick="startGame('chemistry')">เคมี</button>
        </div>
    </div>

    <div id="game" class="hidden">
        <div class="progress"><div id="progressBar" class="progress-bar"></div></div>
        <h3 id="questionNumber"></h3>
        <h2 id="questionText"></h2>
        <div id="choices"></div>

        <div id="explanationBox">
            <h3>💡 คำอธิบาย:</h3>
            <p id="explanationText"></p>
        </div>

        <div style="margin-top:20px; text-align:right;">
            <button id="checkBtn" class="menuBtn" onclick="checkAnswer()">ตรวจสอบคำตอบ</button>
            <button id="nextBtn" class="menuBtn hidden" onclick="nextQuestion()">ข้อต่อไป</button>
        </div>
    </div>

    <div id="result" class="hidden">
        <h2 id="subjectText"></h2>
        <h1 id="finalScore"></h1>
        <button class="menuBtn" onclick="location.reload()">เล่นใหม่</button>
    </div>
</div>

<script>
let subject = "";
let shuffled = [];
let current = 0;
let score = 0;
let selected = null;
let isAnswered = false;

// Physics Data with Explanations
const physicsQuestions = [
    {q:"หน่วยของแรงในระบบ SI คืออะไร?", a:["Newton","Joule","Pascal","Watt"], correct:0, exp:"<b>Newton (N)</b> คือหน่วยของแรง ตั้งชื่อตาม เซอร์ ไอแซก นิวตัน"},

    {q:"ค่าความเร่งเนื่องจากแรงโน้มถ่วงของโลกประมาณเท่าไร?", a:["9.8 m/s²","5 m/s²","15 m/s²","1 m/s²"], correct:0, exp:"ค่ามาตรฐาน <b>g</b> ของโลกมีค่าประมาณ <b>9.80665 m/s²</b>"},
    {q:"หน่วยของกำลังคืออะไร?", a:["Watt","Newton","Volt","Joule"], correct:0, exp:"<b>Watt (W)</b> คือหน่วยของกำลัง (งานที่ทำได้ในหนึ่งหน่วยเวลา)"},
    {q:"หน่วยของพลังงานคืออะไร?", a:["Joule","Volt","Pascal","Newton"], correct:0, exp:"<b>Joule (J)</b> คือหน่วยวัดพลังงานและงานในระบบ SI"},
    {q:"สูตรของแรงตามกฎข้อที่สองของนิวตันคืออะไร?", a:["F = m × a","F = m × v","F = v × t","F = m ÷ t"], correct:0, exp:"<b>F = ma</b> หมายถึง แรงเท่ากับมวลคูณด้วยความเร่ง"},
    {q:"หน่วยของความดันคืออะไร?", a:["Pascal","Newton","Joule","Volt"], correct:0, exp:"<b>Pascal (Pa)</b> คือแรง 1 นิวตันที่กระทำบนพื้นที่ 1 ตารางเมตร"},

    {q:"ความเร็วของแสงในสุญญากาศประมาณเท่าไร?", a:["3×10^8 m/s","3×10^5 m/s","300 m/s","30 m/s"], correct:0, exp:"แสงเดินทางด้วยความเร็วประมาณ <b>300,000,000 เมตรต่อวินาที</b>"},
    {q:"หน่วยของกระแสไฟฟ้าคืออะไร?", a:["Ampere","Volt","Ohm","Watt"], correct:0, exp:"<b>Ampere (A)</b> คือหน่วยวัดปริมาณกระแสไฟฟ้าที่ไหลผ่านวงจร"},
    {q:"แรงเสียดทานมีผลต่อการเคลื่อนที่อย่างไร?", a:["ทำให้วัตถุเคลื่อนที่ช้าลง","ทำให้วัตถุเร็วขึ้น","ทำให้วัตถุหนักขึ้น","ทำให้วัตถุเบาลง"], correct:0, exp:"แรงเสียดทานจะมีทิศทางตรงข้ามกับการเคลื่อนที่เสมอ"},

    {q:"ความเร่งหมายถึงอะไร?", a:["การเปลี่ยนแปลงของความเร็ว","การเปลี่ยนแปลงของมวล","การเปลี่ยนแปลงของแรง","การเปลี่ยนแปลงของเวลา"], correct:0, exp:"<b>ความเร่ง (a)</b> คืออัตราการเปลี่ยนแปลงความเร็วต่อหนึ่งหน่วยเวลา"},

function shuffle(array){
    for(let i=array.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function startGame(type){
    subject = type;
    let pool = type === "physics" ? [...physicsQuestions] : [...chemistryQuestions];
    shuffled = shuffle(pool).slice(0, 25);
    current = 0;
    score = 0;
    document.getElementById("menu").classList.add("hidden");
    document.getElementById("game").classList.remove("hidden");
    showQuestion();
}

function showQuestion(){
    selected = null;
    isAnswered = false;
    document.getElementById("nextBtn").classList.add("hidden");
    document.getElementById("checkBtn").classList.remove("hidden");
    document.getElementById("checkBtn").disabled = false;
    document.getElementById("explanationBox").style.display = "none";

    let q = shuffled[current];
    document.getElementById("questionNumber").innerText = `ข้อ ${current + 1} / 25`;
    document.getElementById("questionText").innerText = q.q;

    // Shuffle choices for display
    let displayChoices = q.a.map((val, idx) => ({ text: val, originalIdx: idx }));
    shuffle(displayChoices);

    let html = "";
    displayChoices.forEach(c => {
        html += `<button class="choice" onclick="selectChoice(this, '${c.text}')">${c.text}</button>`;
    });

    document.getElementById("choices").innerHTML = html;
    document.getElementById("progressBar").style.width = ((current + 1) / 25 * 100) + "%";
}

function selectChoice(el, val){
    if(isAnswered) return;
    document.querySelectorAll(".choice").forEach(b => b.classList.remove("selected"));
    el.classList.add("selected");
    selected = val;
}

function checkAnswer(){
    if(selected == null || isAnswered) return;
    
    isAnswered = true;
    let q = shuffled[current];
    let correctValue = q.a[q.correct];

    document.querySelectorAll(".choice").forEach(btn => {
        btn.classList.add("locked");
        if(btn.innerText === correctValue){
            btn.classList.add("correct");
        }
        if(btn.innerText === selected && selected !== correctValue){
            btn.classList.add("wrong");
        }
    });

    if(selected === correctValue) score++;

    // แสดงคำอธิบาย
    document.getElementById("explanationText").innerHTML = q.exp;
    document.getElementById("explanationBox").style.display = "block";
    
    document.getElementById("checkBtn").classList.add("hidden");
    document.getElementById("nextBtn").classList.remove("hidden");
}

function nextQuestion(){
    current++;
    if(current >= 25){
        finish();
    } else {
        showQuestion();
    }
}

function finish(){
    document.getElementById("game").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
    let percent = Math.round((score / 25) * 100);
    let subjectName = subject === "physics" ? "ฟิสิกส์" : "เคมี";
    document.getElementById("subjectText").innerText = "วิชา " + subjectName;
    document.getElementById("finalScore").innerText = `คะแนนของคุณคือ ${score} / 25 (${percent}%)`;
}
</script>
