<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Science Quiz</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

/* ===== BODY ===== */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* ===== MAIN CONTAINER ===== */
.container{
width:650px;
max-width:92%;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);

padding:40px;
border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.5);

animation:fadeIn 0.6s ease;
}

/* ===== TITLES ===== */
h1{
text-align:center;
font-size:32px;
margin-bottom:25px;
}

h2{
margin-bottom:20px;
}

h3{
margin-bottom:10px;
color:#cbd5f5;
}

/* ===== MENU BUTTON ===== */
.menuBtn{

background:linear-gradient(45deg,#6366f1,#4f46e5);

color:white;
border:none;

padding:14px 24px;
margin:10px;

border-radius:12px;

font-size:17px;
font-weight:600;

cursor:pointer;

transition:all 0.25s ease;

}

.menuBtn:hover{

transform:translateY(-3px) scale(1.05);

box-shadow:0 10px 25px rgba(99,102,241,0.6);

}

/* ===== QUESTION CHOICE ===== */
.choice{

display:block;
width:100%;

background:rgba(255,255,255,0.05);

border:2px solid rgba(255,255,255,0.08);

padding:16px;

border-radius:12px;

margin:12px 0;

font-size:16px;

color:white;

cursor:pointer;

transition:all 0.25s ease;

}

/* hover effect */
.choice:hover{

background:rgba(99,102,241,0.15);

border-color:#6366f1;

transform:translateY(-2px) scale(1.02);

box-shadow:0 8px 20px rgba(0,0,0,0.35);

}

/* selected */
.choice.selected{

border-color:#facc15;

background:rgba(250,204,21,0.15);

}

/* correct */
.correct{

background:#22c55e !important;

border-color:#22c55e !important;

}

/* wrong */
.wrong{

background:#ef4444 !important;

border-color:#ef4444 !important;

}

/* ===== GAME BUTTON ===== */
button{

cursor:pointer;

}

/* ===== PROGRESS BAR ===== */
.progress{

width:100%;
height:12px;

background:rgba(255,255,255,0.08);

border-radius:20px;

margin-bottom:25px;

overflow:hidden;

}

.progress-bar{

height:100%;

width:0%;

background:linear-gradient(90deg,#22c55e,#4ade80);

transition:width 0.4s ease;

}

/* ===== RESULT ===== */
#result h1{

font-size:36px;

margin-top:20px;

}

/* ===== HIDDEN ===== */
.hidden{

display:none;

}

/* ===== ANIMATION ===== */
@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.fade{
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

</style>
</head>


<body>

<div class="container">

<div id="menu">

<h1>Science Quiz</h1>

<button class="menuBtn" onclick="startGame('physics')">ฟิสิกส์</button>
<button class="menuBtn" onclick="startGame('chemistry')">เคมี</button>

</div>



<div id="game" class="hidden">

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<h3 id="questionNumber"></h3>
<h2 id="questionText"></h2>

<div id="choices"></div>

<button id="nextBtn" class="menuBtn hidden" onclick="nextQuestion()">ไปข้อต่อไป</button>
<button class="menuBtn" onclick="checkAnswer()">ตรวจสอบคำตอบ</button>

</div>



<div id="result" class="hidden">

<h2 id="subjectText"></h2>
<h1 id="finalScore"></h1>

<button class="menuBtn" onclick="location.reload()">เล่นใหม่</button>

</div>

</div>



<script>

let subject=""
let questions=[]
let shuffled=[]
let current=0
let score=0
let selected=null



function shuffle(array){

for(let i=array.length-1;i>0;i--){

let j=Math.floor(Math.random()*(i+1))

let temp=array[i]
array[i]=array[j]
array[j]=temp

}

return array

}



function startGame(type){

subject=type

if(type==="physics"){
questions=[...physicsQuestions]
}

if(type==="chemistry"){
questions=[...chemistryQuestions]
}

shuffle(questions)

shuffled=questions.slice(0,25)

current=0
score=0

document.getElementById("menu").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

showQuestion()

}



function showQuestion(){

selected=null

document.getElementById("nextBtn").classList.add("hidden")

let q=shuffled[current]

document.getElementById("questionNumber").innerText="ข้อ "+(current+1)+" / 25"

document.getElementById("questionText").innerText=q.q

let choices=[...q.a]

shuffle(choices)

let html=""

choices.forEach(c=>{

html+=`<button class="choice" onclick="selectChoice(this,'${c}')">${c}</button>`

})

document.getElementById("choices").innerHTML=html

document.getElementById("progressBar").style.width=((current+1)/25*100)+"%"

document.getElementById("questionText").classList.add("fade")

}



function selectChoice(el,val){

document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"))

el.classList.add("selected")

selected=val

}



function checkAnswer(){

if(selected==null)return

let q=shuffled[current]

let correct=q.a[q.correct]

document.querySelectorAll(".choice").forEach(btn=>{

if(btn.innerText===correct){
btn.classList.add("correct")
}

if(btn.innerText===selected && selected!==correct){
btn.classList.add("wrong")
}

})

if(selected===correct)score++

document.getElementById("nextBtn").classList.remove("hidden")

}



function nextQuestion(){

current++

if(current>=25){
finish()
return
}

showQuestion()

}



function finish(){

document.getElementById("game").classList.add("hidden")
document.getElementById("result").classList.remove("hidden")

let percent=Math.round((score/25)*100)

let subjectName=subject==="physics"?"ฟิสิกส์":"เคมี"

document.getElementById("subjectText").innerText="วิชา "+subjectName

document.getElementById("finalScore").innerText=
"คะแนน "+score+" / 25 ("+percent+"%)"

}



let physicsQuestions=[
{q:"หน่วยของแรงในระบบ SI คืออะไร?",a:["Newton","Joule","Pascal","Watt"],correct:0},
{q:"สูตรคำนวณความเร็วคือข้อใด?",a:["ระยะทาง ÷ เวลา","แรง ÷ เวลา","มวล × เวลา","พลังงาน ÷ เวลา"],correct:0},
{q:"ค่าความเร่งเนื่องจากแรงโน้มถ่วงของโลกประมาณเท่าไร?",a:["9.8 m/s²","5 m/s²","15 m/s²","1 m/s²"],correct:0},
{q:"หน่วยของกำลังคืออะไร?",a:["Watt","Newton","Volt","Joule"],correct:0},
{q:"หน่วยของพลังงานคืออะไร?",a:["Joule","Volt","Pascal","Newton"],correct:0},
{q:"สูตรของแรงตามกฎข้อที่สองของนิวตันคืออะไร?",a:["F = m × a","F = m × v","F = v × t","F = m ÷ t"],correct:0},
{q:"หน่วยของความดันคืออะไร?",a:["Pascal","Newton","Joule","Volt"],correct:0},
{q:"สูตรคำนวณกำลังคือข้อใด?",a:["งาน ÷ เวลา","แรง ÷ เวลา","ระยะทาง ÷ เวลา","พลังงาน × เวลา"],correct:0},
{q:"ความเร็วของแสงในสุญญากาศประมาณเท่าไร?",a:["3×10^8 m/s","3×10^5 m/s","300 m/s","30 m/s"],correct:0},
{q:"หน่วยของกระแสไฟฟ้าคืออะไร?",a:["Ampere","Volt","Ohm","Watt"],correct:0},
{q:"แรงเสียดทานมีผลต่อการเคลื่อนที่อย่างไร?",a:["ทำให้วัตถุเคลื่อนที่ช้าลง","ทำให้วัตถุเร็วขึ้น","ทำให้วัตถุหนักขึ้น","ทำให้วัตถุเบาลง"],correct:0},
{q:"เสียงเดินทางเร็วที่สุดในตัวกลางชนิดใด?",a:["ของแข็ง","ของเหลว","อากาศ","สุญญากาศ"],correct:0},
{q:"ความเร่งหมายถึงอะไร?",a:["การเปลี่ยนแปลงของความเร็ว","การเปลี่ยนแปลงของมวล","การเปลี่ยนแปลงของแรง","การเปลี่ยนแปลงของเวลา"],correct:0},
{q:"แม่เหล็กสามารถดูดโลหะชนิดใดได้ดีที่สุด?",a:["เหล็ก","ทอง","เงิน","ไม้"],correct:0},
{q:"หน่วยของความถี่คืออะไร?",a:["Hertz","Newton","Volt","Watt"],correct:0},
{q:"คลื่นกลต้องอาศัยอะไรในการเคลื่อนที่?",a:["ตัวกลาง","อากาศ","น้ำ","สุญญากาศ"],correct:0},
{q:"ความยาวคลื่นคือระยะระหว่างอะไร?",a:["ยอดคลื่นถึงยอดคลื่นถัดไป","ความสูงของคลื่น","ช่วงเวลา","แรงของคลื่น"],correct:0},
{q:"วงจรไฟฟ้าจะทำงานได้เมื่อใด?",a:["เมื่อวงจรปิด","เมื่อวงจรเปิด","เมื่อไม่มีสายไฟ","เมื่อวงจรแตก"],correct:0},
{q:"แรงแม่เหล็กสามารถเกิดจากสิ่งใด?",a:["กระแสไฟฟ้า","เสียง","แสง","ความร้อน"],correct:0},
{q:"ถ้าแรงลัพธ์ที่กระทำต่อวัตถุเป็นศูนย์ วัตถุจะเป็นอย่างไร?",a:["หยุดนิ่งหรือเคลื่อนที่ด้วยความเร็วคงที่","เคลื่อนที่เร็วขึ้น","เคลื่อนที่ช้าลง","หยุดทันที"],correct:0},
{q:"พลังงานจลน์ขึ้นอยู่กับปัจจัยใด?",a:["มวลและความเร็ว","เวลา","แรง","อุณหภูมิ"],correct:0},
{q:"พลังงานศักย์โน้มถ่วงขึ้นอยู่กับอะไร?",a:["ความสูงของวัตถุ","เวลา","แรง","อุณหภูมิ"],correct:0},
{q:"แรงโน้มถ่วงคือแรงประเภทใด?",a:["แรงดึงดูดระหว่างมวล","แรงผลัก","แรงแม่เหล็ก","แรงไฟฟ้า"],correct:0},
{q:"หน่วยของกำลังไฟฟ้าคืออะไร?",a:["Watt","Volt","Ampere","Ohm"],correct:0},
{q:"กระแสไฟฟ้าคือการเคลื่อนที่ของอะไร?",a:["อิเล็กตรอน","โปรตอน","นิวตรอน","อะตอม"],correct:0}
]

let chemistryQuestions=[
{q:"สูตรเคมีของน้ำคืออะไร?",a:["H2O","CO2","O2","H2"],correct:0},
{q:"สูตรเคมีของเกลือแกงคืออะไร?",a:["NaCl","KCl","CaCO3","Na2O"],correct:0},
{q:"สัญลักษณ์ธาตุของออกซิเจนคืออะไร?",a:["O","Ox","Og","On"],correct:0},
{q:"สัญลักษณ์ธาตุของไฮโดรเจนคืออะไร?",a:["H","Hy","Hd","Hg"],correct:0},
{q:"ค่า pH ของสารที่เป็นกลางคือเท่าไร?",a:["7","5","9","1"],correct:0},
{q:"CO2 คือสารใด?",a:["คาร์บอนไดออกไซด์","ออกซิเจน","ไนโตรเจน","มีเทน"],correct:0},
{q:"สัญลักษณ์ Na คือธาตุอะไร?",a:["โซเดียม","ทอง","เงิน","เหล็ก"],correct:0},
{q:"สัญลักษณ์ Fe คือธาตุอะไร?",a:["เหล็ก","ทอง","เงิน","สังกะสี"],correct:0},
{q:"สัญลักษณ์ Ag คือธาตุอะไร?",a:["เงิน","ทอง","เหล็ก","ตะกั่ว"],correct:0},
{q:"สัญลักษณ์ Au คือธาตุอะไร?",a:["ทอง","เงิน","เหล็ก","ทองแดง"],correct:0},
{q:"น้ำแข็งอยู่ในสถานะของสสารใด?",a:["ของแข็ง","ของเหลว","แก๊ส","พลาสมา"],correct:0},
{q:"ไอน้ำอยู่ในสถานะของสสารใด?",a:["แก๊ส","ของแข็ง","ของเหลว","โลหะ"],correct:0},
{q:"เกลือแกง (NaCl) สามารถละลายในน้ำได้หรือไม่?",a:["ใช่","ไม่ใช่","บางครั้ง","ไม่รู้"],correct:0},
{q:"แก๊ส O2 จำเป็นต่อกระบวนการใดของสิ่งมีชีวิต?",a:["การหายใจ","การกิน","การนอน","การเดิน"],correct:0},
{q:"สัญลักษณ์ของธาตุคาร์บอนคืออะไร?",a:["C","Ca","Co","Cu"],correct:0},
{q:"สัญลักษณ์ของธาตุไนโตรเจนคืออะไร?",a:["N","Na","Ne","Ni"],correct:0},
{q:"สารที่เป็นกรดจะมีค่า pH แบบใด?",a:["pH ต่ำ","pH สูง","pH 7","ไม่เปลี่ยน"],correct:0},
{q:"สารที่เป็นเบสจะมีค่า pH แบบใด?",a:["pH สูง","pH ต่ำ","pH 7","ไม่เปลี่ยน"],correct:0},
{q:"สาร HCl จัดเป็นสารประเภทใด?",a:["กรด","เบส","เกลือ","โลหะ"],correct:0},
{q:"สาร NaOH จัดเป็นสารประเภทใด?",a:["เบส","กรด","เกลือ","แก๊ส"],correct:0},
{q:"CaCO3 พบมากในสารใด?",a:["หินปูน","เกลือ","น้ำ","กรด"],correct:0},
{q:"การเผาไหม้ต้องใช้แก๊สอะไร?",a:["O2","CO2","N2","H2"],correct:0},
{q:"น้ำเดือดที่อุณหภูมิเท่าไร (ที่ความดันปกติ)?",a:["100°C","50","0","200"],correct:0},
{q:"น้ำแข็งเริ่มละลายที่อุณหภูมิเท่าไร?",a:["0°C","10","50","100"],correct:0},
{q:"สูตรเคมีของมีเทนคืออะไร?",a:["CH4","CO2","H2O","NH3"],correct:0}
]

</script>

</body>
</html>
