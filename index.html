<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Science Quiz</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

/* ===== BODY ===== */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* ===== MAIN CONTAINER ===== */
.container{
width:650px;
max-width:92%;
max-height: 95vh;
overflow-y: auto;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);

padding:40px;
border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.5);

animation:fadeIn 0.6s ease;
}

/* ===== TITLES ===== */
h1{
text-align:center;
font-size:32px;
margin-bottom:25px;
}

h2{
margin-bottom:20px;
line-height: 1.4;
}

h3{
margin-bottom:10px;
color:#cbd5f5;
}

/* ===== MENU BUTTON ===== */
.menuBtn{

background:linear-gradient(45deg,#6366f1,#4f46e5);

color:white;
border:none;

padding:14px 24px;
margin:10px;

border-radius:12px;

font-size:17px;
font-weight:600;

cursor:pointer;

transition:all 0.25s ease;

}

.menuBtn:hover{

transform:translateY(-3px) scale(1.05);

box-shadow:0 10px 25px rgba(99,102,241,0.6);

}

/* ===== QUESTION CHOICE ===== */
.choice{

display:block;
width:100%;

background:rgba(255,255,255,0.05);

border:2px solid rgba(255,255,255,0.08);

padding:16px;

border-radius:12px;

margin:12px 0;

font-size:16px;

color:white;
text-align: left;
cursor:pointer;

transition:all 0.25s ease;

}

/* hover effect */
.choice:not(:disabled):hover{

background:rgba(99,102,241,0.15);

border-color:#6366f1;

transform:translateY(-2px) scale(1.02);

box-shadow:0 8px 20px rgba(0,0,0,0.35);

}

/* selected */
.choice.selected{

border-color:#facc15;

background:rgba(250,204,21,0.15);

}

/* correct */
.correct{

background:#22c55e !important;

border-color:#22c55e !important;

}

/* wrong */
.wrong{

background:#ef4444 !important;

border-color:#ef4444 !important;

}

/* Disabled state */
.choice:disabled {
cursor: default;
}

/* ===== EXPLANATION BOX ===== */
#explanationBox {
background: rgba(34, 197, 94, 0.1);
border-left: 4px solid #4ade80;
padding: 16px;
margin-top: 20px;
margin-bottom: 20px;
border-radius: 8px;
animation: fadeIn 0.4s ease;
}

#explanationBox h4 {
color: #4ade80;
margin-bottom: 8px;
font-size: 18px;
}

#explanationText {
font-size: 15px;
color: #e2e8f0;
line-height: 1.5;
}


/* ===== GAME BUTTON ===== */
button{

cursor:pointer;

}

/* ===== PROGRESS BAR ===== */
.progress{

width:100%;
height:12px;

background:rgba(255,255,255,0.08);

border-radius:20px;

margin-bottom:25px;

overflow:hidden;

}

.progress-bar{

height:100%;

width:0%;

background:linear-gradient(90deg,#22c55e,#4ade80);

transition:width 0.4s ease;

}

/* ===== RESULT ===== */
#result h1{

font-size:36px;

margin-top:20px;

}

/* ===== HIDDEN ===== */
.hidden{

display:none !important;

}

/* ===== ANIMATION ===== */
@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.fade{
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

</style>
</head>


<body>

<div class="container">

<div id="menu">

<h1>Science Quiz</h1>

<div style="text-align: center;">
<button class="menuBtn" onclick="startGame('physics')">ฟิสิกส์</button>
<button class="menuBtn" onclick="startGame('chemistry')">เคมี</button>
</div>

</div>



<div id="game" class="hidden">

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<h3 id="questionNumber"></h3>
<h2 id="questionText"></h2>

<div id="choices"></div>

<div id="explanationBox" class="hidden">
<h4>💡 คำอธิบาย:</h4>
<p id="explanationText"></p>
</div>

<div style="text-align: right; margin-top: 15px;">
<button id="checkBtn" class="menuBtn" onclick="checkAnswer()">ตรวจสอบคำตอบ</button>
<button id="nextBtn" class="menuBtn hidden" onclick="nextQuestion()">ไปข้อต่อไป ➔</button>
</div>

</div>



<div id="result" class="hidden" style="text-align: center;">

<h2 id="subjectText"></h2>
<h1 id="finalScore"></h1>
<br>
<button class="menuBtn" onclick="location.reload()">เล่นใหม่</button>

</div>

</div>



<script>

let subject=""
let questions=[]
let shuffled=[]
let current=0
let score=0
let selected=null
let hasAnswered=false // ตัวแปรสำหรับป้องกันการเปลี่ยนคำตอบ



function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
let temp=array[i]
array[i]=array[j]
array[j]=temp
}
return array
}



function startGame(type){
subject=type
if(type==="physics"){
questions=[...physicsQuestions]
}
if(type==="chemistry"){
questions=[...chemistryQuestions]
}

shuffle(questions)
shuffled=questions.slice(0,25)
current=0
score=0

document.getElementById("menu").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

showQuestion()
}



function showQuestion(){
selected=null
hasAnswered=false

document.getElementById("nextBtn").classList.add("hidden")
document.getElementById("checkBtn").classList.remove("hidden")
document.getElementById("explanationBox").classList.add("hidden")

let q=shuffled[current]
document.getElementById("questionNumber").innerText="ข้อ "+(current+1)+" / 25"
document.getElementById("questionText").innerText=q.q

let choices=[...q.a]
shuffle(choices)
let html=""

choices.forEach(c=>{
html+=`<button class="choice" onclick="selectChoice(this,'${c}')">${c}</button>`
})

document.getElementById("choices").innerHTML=html
document.getElementById("progressBar").style.width=((current+1)/25*100)+"%"

// รีเซ็ตแอนิเมชัน
let qText = document.getElementById("questionText");
qText.classList.remove("fade");
void qText.offsetWidth; // trigger reflow
qText.classList.add("fade");
}



function selectChoice(el,val){
if(hasAnswered) return; // ถ้าตอบไปแล้วจะไม่ให้เปลี่ยน

document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"))
el.classList.add("selected")
selected=val
}



function checkAnswer(){
if(selected==null || hasAnswered) return;

hasAnswered=true // ล็อคการตอบ
let q=shuffled[current]
let correct=q.a[q.correct]

document.querySelectorAll(".choice").forEach(btn=>{
btn.disabled = true; // ปิดปุ่มตัวเลือกไม่ให้กดได้อีก

if(btn.innerText===correct){
btn.classList.add("correct")
}
if(btn.innerText===selected && selected!==correct){
btn.classList.add("wrong")
}
})

if(selected===correct) {
score++;
}

// แสดงเฉลย
document.getElementById("explanationText").innerText = q.exp || "ไม่มีคำอธิบายเพิ่มเติม";
document.getElementById("explanationBox").classList.remove("hidden");

// สลับปุ่มตรวจคำตอบเป็นปุ่มไปข้อถัดไป
document.getElementById("checkBtn").classList.add("hidden")
document.getElementById("nextBtn").classList.remove("hidden")
}



function nextQuestion(){
current++
if(current>=25){
finish()
return
}
showQuestion()
}



function finish(){
document.getElementById("game").classList.add("hidden")
document.getElementById("result").classList.remove("hidden")

let percent=Math.round((score/25)*100)
let subjectName=subject==="physics"?"ฟิสิกส์":"เคมี"

document.getElementById("subjectText").innerText="สรุปผลคะแนนวิชา "+subjectName
document.getElementById("finalScore").innerText= score+" / 25 ("+percent+"%)"
}


let physicsQuestions=[
{q:"ปรากฏการณ์โฟโตอิเล็กทริก (Photoelectric Effect) อธิบายว่าแสงมีสมบัติเป็นอะไร?",a:["อนุภาค","คลื่น","ของเหลว","พลาสมา"],correct:0, exp:"ไอน์สไตน์อธิบายว่าแสงประกอบด้วยอนุภาคพลังงานที่เรียกว่า 'โฟตอน' ซึ่งสามารถชนอิเล็กตรอนให้หลุดจากผิวโลหะได้"},
{q:"สมการความสัมพันธ์ระหว่างมวลและพลังงานของไอน์สไตน์คือข้อใด?",a:["E = mc^2","E = hf","F = ma","v = fλ"],correct:0, exp:"สมการ E = mc^2 แสดงให้เห็นว่ามวลสามารถเปลี่ยนเป็นพลังงานมหาศาลได้ ซึ่งเป็นพื้นฐานของฟิสิกส์นิวเคลียร์"},
{q:"หน่วยของค่าคงตัวของพลังค์ (Planck's constant) คืออะไร?",a:["J·s","N·m","W/m^2","eV"],correct:0, exp:"ค่าคงตัวของพลังค์ (h) มีค่าประมาณ 6.626 x 10^-34 จูลวินาที (J·s) ใช้ในการคำนวณพลังงานของควอนตัม"},
{q:"อนุภาคแอลฟา (Alpha particle) มีลักษณะเหมือนกับนิวเคลียสของธาตุใด?",a:["ฮีเลียม (He)","ไฮโดรเจน (H)","ลิเทียม (Li)","คาร์บอน (C)"],correct:0, exp:"อนุภาคแอลฟาประกอบด้วยโปรตอน 2 ตัวและนิวตรอน 2 ตัว ซึ่งเหมือนกับนิวเคลียสของธาตุฮีเลียม-4"},
{q:"รังสีใดมีอำนาจทะลุทะลวงสูงที่สุด?",a:["รังสีแกมมา","รังสีแอลฟา","รังสีบีตา","รังสีเอ็กซ์"],correct:0, exp:"รังสีแกมมา (Gamma ray) เป็นคลื่นแม่เหล็กไฟฟ้าที่มีความถี่สูงมาก ไม่มีมวลและประจุ จึงทะลุทะลวงได้ดีที่สุด"},
{q:"ครึ่งชีวิต (Half-life) ของธาตุกัมมันตรังสีหมายถึงอะไร?",a:["เวลาที่สารสลายตัวไปครึ่งหนึ่งของปริมาณเดิม","เวลาที่สารสลายตัวหมด","เวลาที่สารเปล่งแสงได้","เวลาที่สารเปลี่ยนสถานะ"],correct:0, exp:"ครึ่งชีวิตคือระยะเวลาที่นิวเคลียสของธาตุกัมมันตรังสีสลายตัวจนเหลือจำนวนเพียงครึ่งหนึ่งของตอนเริ่มต้น"},
{q:"ปฏิกิริยานิวเคลียร์แบบฟิชชัน (Fission) คืออะไร?",a:["การแตกตัวของนิวเคลียสหนัก","การรวมตัวของนิวเคลียสเบา","การสลายตัวของอิเล็กตรอน","การแผ่รังสีของไอโซโทป"],correct:0, exp:"ฟิชชันคือกระบวนการที่นิวเคลียสของธาตุหนัก (เช่น ยูเรเนียม) แตกออกเป็นนิวเคลียสที่เบากว่า พร้อมปล่อยพลังงานมหาศาล"},
{q:"พลังงานที่ยึดเหนี่ยวนิวคลีออนไว้ในนิวเคลียสเรียกว่าอะไร?",a:["พลังงานยึดเหนี่ยว (Binding Energy)","พลังงานจลน์","พลังงานศักย์","พลังงานไอออไนเซชัน"],correct:0, exp:"พลังงานยึดเหนี่ยวคือน้อยที่สุดที่ต้องใช้ในการแยกนิวคลีออน (โปรตอนและนิวตรอน) ออกจากกัน"},
{q:"คลื่นแม่เหล็กไฟฟ้าชนิดใดมีความยาวคลื่นสั้นที่สุด?",a:["รังสีแกมมา","คลื่นวิทยุ","แสงที่มองเห็นได้","รังสีอินฟราเรด"],correct:0, exp:"รังสีแกมมามีความยาวคลื่นสั้นที่สุดและมีความถี่สูงสุด จึงมีพลังงานมากที่สุดในสเปกตรัมคลื่นแม่เหล็กไฟฟ้า"},
{q:"โปรตอน 1 ตัว ประกอบด้วยอนุภาคควาร์ก (Quark) แบบใดบ้าง?",a:["Up 2, Down 1","Up 1, Down 2","Up 3","Down 3"],correct:0, exp:"โปรตอนประกอบด้วยอัปควาร์ก (Up) 2 อนุภาค และดาวน์ควาร์ก (Down) 1 อนุภาค (uud)"},
{q:"ใครเป็นผู้เสนอสมมติฐานว่าอนุภาคสามารถแสดงสมบัติเป็นคลื่นได้?",a:["เดอบรอยล์ (De Broglie)","นีลส์ บอร์","รัทเทอร์ฟอร์ด","ทอมสัน"],correct:0, exp:"หลุยส์ เดอบรอยล์ เสนอทฤษฎีทวิภาวะของคลื่นและอนุภาค ว่าสสารทุกชนิดสามารถประพฤติตัวเป็นคลื่นได้เรียกว่า 'คลื่นสสาร'"},
{q:"แรงใดในธรรมชาติที่มีความเข้มมากที่สุด?",a:["แรงเข้ม (Strong Force)","แรงโน้มถ่วง","แรงแม่เหล็กไฟฟ้า","แรงอ่อน (Weak Force)"],correct:0, exp:"แรงนิวเคลียร์แบบเข้ม (Strong nuclear force) เป็นแรงที่ยึดโปรตอนและนิวตรอนไว้ในนิวเคลียส มีความเข้มมากที่สุดแต่ระยะส่งผลสั้นมาก"},
{q:"แบบจำลองอะตอมของบอร์ (Bohr) อธิบายสเปกตรัมของธาตุใดได้ดีที่สุด?",a:["ไฮโดรเจน","ฮีเลียม","ออกซิเจน","ยูเรเนียม"],correct:0, exp:"แบบจำลองของบอร์อธิบายการเปลี่ยนระดับพลังงานของอิเล็กตรอนในอะตอมที่มีอิเล็กตรอนตัวเดียว เช่น ไฮโดรเจน ได้อย่างสมบูรณ์แบบ"},
{q:"รังสีบีตา (Beta) คืออนุภาคใด?",a:["อิเล็กตรอน หรือ โพซิตรอน","โปรตอน","นิวตรอน","อนุภาคฮีเลียม"],correct:0, exp:"รังสีบีตาลบคืออิเล็กตรอนความเร็วสูง ส่วนรังสีบีตาบวกคือโพซิตรอน ซึ่งเกิดจากการสลายตัวภายในนิวเคลียส"},
{q:"ในวงจรไฟฟ้ากระแสสลับ (AC) อุปกรณ์ใดทำหน้าที่เก็บประจุและคายประจุ?",a:["ตัวเก็บประจุ (Capacitor)","ตัวเหนี่ยวนำ (Inductor)","ตัวต้านทาน (Resistor)","ไดโอด (Diode)"],correct:0, exp:"ตัวเก็บประจุ (C) ในวงจร AC จะทำการชาร์จและดิสชาร์จประจุสลับไปมาตามความถี่ของแหล่งกำเนิดไฟฟ้า"},
{q:"ค่าความต้านทานเชิงเหนี่ยวนำ (XL) แปรผันตรงกับสิ่งใด?",a:["ความถี่ของกระแสไฟฟ้า","ปริมาณประจุไฟฟ้า","ขนาดของตัวต้านทาน","ความต้านทานของสายไฟ"],correct:0, exp:"สูตร XL = 2πfL แสดงให้เห็นว่าความต้านทานเชิงเหนี่ยวนำแปรผันตรงกับความถี่ (f) ของกระแสสลับ"},
{q:"ปฏิกิริยาบนดวงอาทิตย์เป็นปฏิกิริยานิวเคลียร์แบบใด?",a:["ฟิวชัน (Fusion)","ฟิชชัน (Fission)","การสลายตัวให้อัลฟา","ปรากฏการณ์ซีแมน"],correct:0, exp:"ฟิวชันคือการหลอมรวมนิวเคลียสของไฮโดรเจนให้กลายเป็นฮีเลียม ซึ่งเป็นแหล่งพลังงานมหาศาลของดาวฤกษ์"},
{q:"ไอโซโทป (Isotope) คือธาตุที่มีสิ่งใดเท่ากัน?",a:["จำนวนโปรตอน","จำนวนนิวตรอน","เลขมวล","จำนวนอิเล็กตรอนอิสระ"],correct:0, exp:"ไอโซโทปคืออะตอมของธาตุชนิดเดียวกัน (โปรตอนเท่ากัน) แต่มีจำนวนนิวตรอนต่างกัน ทำให้เลขมวลต่างกัน"},
{q:"คลื่นแม่เหล็กไฟฟ้าเกิดจากการเปลี่ยนแปลงของสิ่งใด?",a:["สนามไฟฟ้าและสนามแม่เหล็ก","ความดันอากาศ","อุณหภูมิของตัวกลาง","แรงโน้มถ่วง"],correct:0, exp:"คลื่นแม่เหล็กไฟฟ้าเกิดจากการเหนี่ยวนำสลับกันไปมาระหว่างสนามไฟฟ้าและสนามแม่เหล็กที่ตั้งฉากกันและเคลื่อนที่ไปพร้อมกัน"},
{q:"ฟังก์ชันงาน (Work Function) ในปรากฏการณ์โฟโตอิเล็กทริกคืออะไร?",a:["พลังงานน้อยที่สุดที่ทำให้อิเล็กตรอนหลุดจากโลหะ","งานที่เกิดจากแรงโน้มถ่วง","พลังงานจลน์สูงสุดของอิเล็กตรอน","พลังงานของโฟตอน"],correct:0, exp:"ฟังก์ชันงาน (W หรือ Φ) คือค่าพลังงานยึดเหนี่ยวขั้นต่ำของผิวโลหะแต่ละชนิดที่แสงต้องเอาชนะเพื่อให้อิเล็กตรอนหลุดออกมาได้"},
