<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Science Quiz</title>

<style>

/* ===== RESET ===== */
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Kanit',sans-serif;
}

/* ===== BODY ===== */
body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(135deg,#0f172a,#020617);
color:white;
}

/* ===== MAIN CONTAINER ===== */
.container{
width:650px;
max-width:92%;
max-height: 95vh;
overflow-y: auto;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);

padding:40px;
border-radius:20px;

box-shadow:0 10px 40px rgba(0,0,0,0.5);

animation:fadeIn 0.6s ease;
}

/* ===== TITLES ===== */
h1{
text-align:center;
font-size:32px;
margin-bottom:25px;
}

h2{
margin-bottom:20px;
line-height: 1.4;
}

h3{
margin-bottom:10px;
color:#cbd5f5;
}

/* ===== MENU BUTTON ===== */
.menuBtn{

background:linear-gradient(45deg,#6366f1,#4f46e5);

color:white;
border:none;

padding:14px 24px;
margin:10px;

border-radius:12px;

font-size:17px;
font-weight:600;

cursor:pointer;

transition:all 0.25s ease;

}

.menuBtn:hover{

transform:translateY(-3px) scale(1.05);

box-shadow:0 10px 25px rgba(99,102,241,0.6);

}

/* ===== QUESTION CHOICE ===== */
.choice{

display:block;
width:100%;

background:rgba(255,255,255,0.05);

border:2px solid rgba(255,255,255,0.08);

padding:16px;

border-radius:12px;

margin:12px 0;

font-size:16px;

color:white;
text-align: left;
cursor:pointer;

transition:all 0.25s ease;

}

/* hover effect */
.choice:not(:disabled):hover{

background:rgba(99,102,241,0.15);

border-color:#6366f1;

transform:translateY(-2px) scale(1.02);

box-shadow:0 8px 20px rgba(0,0,0,0.35);

}

/* selected */
.choice.selected{

border-color:#facc15;

background:rgba(250,204,21,0.15);

}

/* correct */
.correct{

background:#22c55e !important;

border-color:#22c55e !important;

}

/* wrong */
.wrong{

background:#ef4444 !important;

border-color:#ef4444 !important;

}

/* Disabled state */
.choice:disabled {
cursor: default;
}

/* ===== EXPLANATION BOX ===== */
#explanationBox {
background: rgba(34, 197, 94, 0.1);
border-left: 4px solid #4ade80;
padding: 16px;
margin-top: 20px;
margin-bottom: 20px;
border-radius: 8px;
animation: fadeIn 0.4s ease;
}

#explanationBox h4 {
color: #4ade80;
margin-bottom: 8px;
font-size: 18px;
}

#explanationText {
font-size: 15px;
color: #e2e8f0;
line-height: 1.5;
}


/* ===== GAME BUTTON ===== */
button{

cursor:pointer;

}

/* ===== PROGRESS BAR ===== */
.progress{

width:100%;
height:12px;

background:rgba(255,255,255,0.08);

border-radius:20px;

margin-bottom:25px;

overflow:hidden;

}

.progress-bar{

height:100%;

width:0%;

background:linear-gradient(90deg,#22c55e,#4ade80);

transition:width 0.4s ease;

}

/* ===== RESULT ===== */
#result h1{

font-size:36px;

margin-top:20px;

}

/* ===== HIDDEN ===== */
.hidden{

display:none !important;

}

/* ===== ANIMATION ===== */
@keyframes fadeIn{

from{
opacity:0;
transform:translateY(15px);
}

to{
opacity:1;
transform:translateY(0);
}

}

.fade{
animation:fade 0.3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

/* Custom Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

</style>
</head>


<body>

<div class="container">

<div id="menu">

<h1>Science Quiz</h1>

<div style="text-align: center;">
<button class="menuBtn" onclick="startGame('physics')">ฟิสิกส์</button>
<button class="menuBtn" onclick="startGame('chemistry')">เคมี</button>
</div>

</div>



<div id="game" class="hidden">

<div class="progress">
<div id="progressBar" class="progress-bar"></div>
</div>

<h3 id="questionNumber"></h3>
<h2 id="questionText"></h2>

<div id="choices"></div>

<div id="explanationBox" class="hidden">
<h4>💡 คำอธิบาย:</h4>
<p id="explanationText"></p>
</div>

<div style="text-align: right; margin-top: 15px;">
<button id="checkBtn" class="menuBtn" onclick="checkAnswer()">ตรวจสอบคำตอบ</button>
<button id="nextBtn" class="menuBtn hidden" onclick="nextQuestion()">ไปข้อต่อไป ➔</button>
</div>

</div>



<div id="result" class="hidden" style="text-align: center;">

<h2 id="subjectText"></h2>
<h1 id="finalScore"></h1>
<br>
<button class="menuBtn" onclick="location.reload()">เล่นใหม่</button>

</div>

</div>



<script>

let subject=""
let questions=[]
let shuffled=[]
let current=0
let score=0
let selected=null
let hasAnswered=false // ตัวแปรสำหรับป้องกันการเปลี่ยนคำตอบ



function shuffle(array){
for(let i=array.length-1;i>0;i--){
let j=Math.floor(Math.random()*(i+1))
let temp=array[i]
array[i]=array[j]
array[j]=temp
}
return array
}



function startGame(type){
subject=type
if(type==="physics"){
questions=[...physicsQuestions]
}
if(type==="chemistry"){
questions=[...chemistryQuestions]
}

shuffle(questions)
shuffled=questions.slice(0,25)
current=0
score=0

document.getElementById("menu").classList.add("hidden")
document.getElementById("game").classList.remove("hidden")

showQuestion()
}



function showQuestion(){
selected=null
hasAnswered=false

document.getElementById("nextBtn").classList.add("hidden")
document.getElementById("checkBtn").classList.remove("hidden")
document.getElementById("explanationBox").classList.add("hidden")

let q=shuffled[current]
document.getElementById("questionNumber").innerText="ข้อ "+(current+1)+" / 25"
document.getElementById("questionText").innerText=q.q

let choices=[...q.a]
shuffle(choices)
let html=""

choices.forEach(c=>{
html+=`<button class="choice" onclick="selectChoice(this,'${c}')">${c}</button>`
})

document.getElementById("choices").innerHTML=html
document.getElementById("progressBar").style.width=((current+1)/25*100)+"%"

// รีเซ็ตแอนิเมชัน
let qText = document.getElementById("questionText");
qText.classList.remove("fade");
void qText.offsetWidth; // trigger reflow
qText.classList.add("fade");
}



function selectChoice(el,val){
if(hasAnswered) return; // ถ้าตอบไปแล้วจะไม่ให้เปลี่ยน

document.querySelectorAll(".choice").forEach(b=>b.classList.remove("selected"))
el.classList.add("selected")
selected=val
}



function checkAnswer(){
if(selected==null || hasAnswered) return;

hasAnswered=true // ล็อคการตอบ
let q=shuffled[current]
let correct=q.a[q.correct]

document.querySelectorAll(".choice").forEach(btn=>{
btn.disabled = true; // ปิดปุ่มตัวเลือกไม่ให้กดได้อีก

if(btn.innerText===correct){
btn.classList.add("correct")
}
if(btn.innerText===selected && selected!==correct){
btn.classList.add("wrong")
}
})

if(selected===correct) {
score++;
}

// แสดงเฉลย
document.getElementById("explanationText").innerText = q.exp || "ไม่มีคำอธิบายเพิ่มเติม";
document.getElementById("explanationBox").classList.remove("hidden");

// สลับปุ่มตรวจคำตอบเป็นปุ่มไปข้อถัดไป
document.getElementById("checkBtn").classList.add("hidden")
document.getElementById("nextBtn").classList.remove("hidden")
}



function nextQuestion(){
current++
if(current>=25){
finish()
return
}
showQuestion()
}



function finish(){
document.getElementById("game").classList.add("hidden")
document.getElementById("result").classList.remove("hidden")

let percent=Math.round((score/25)*100)
let subjectName=subject==="physics"?"ฟิสิกส์":"เคมี"

document.getElementById("subjectText").innerText="สรุปผลคะแนนวิชา "+subjectName
document.getElementById("finalScore").innerText= score+" / 25 ("+percent+"%)"
}



let physicsQuestions=[
{q:"หน่วยของแรงในระบบ SI คืออะไร?",a:["Newton","Joule","Pascal","Watt"],correct:0, exp:"นิวตัน (Newton หรือ N) เป็นหน่วยมาตรฐานของแรง ตั้งชื่อเพื่อเป็นเกียรติแก่ เซอร์ไอแซก นิวตัน"},
{q:"สูตรคำนวณความเร็วคือข้อใด?",a:["ระยะทาง ÷ เวลา","แรง ÷ เวลา","มวล × เวลา","พลังงาน ÷ เวลา"],correct:0, exp:"ความเร็ว (Velocity) หาได้จากอัตราส่วนระหว่างระยะทางที่เคลื่อนที่ได้ต่อหนึ่งหน่วยเวลา (v = s/t)"},
{q:"ค่าความเร่งเนื่องจากแรงโน้มถ่วงของโลกประมาณเท่าไร?",a:["9.8 m/s²","5 m/s²","15 m/s²","1 m/s²"],correct:0, exp:"ความเร่งเนื่องจากแรงโน้มถ่วงของโลก (g) มีค่าเฉลี่ยประมาณ 9.8 m/s² หรือ 9.81 m/s²"},
{q:"หน่วยของกำลังคืออะไร?",a:["Watt","Newton","Volt","Joule"],correct:0, exp:"วัตต์ (Watt) เป็นหน่วยของกำลัง ซึ่งหมายถึงอัตราการทำงานหรือใช้พลังงาน 1 จูลใน 1 วินาที"},
{q:"หน่วยของพลังงานคืออะไร?",a:["Joule","Volt","Pascal","Newton"],correct:0, exp:"จูล (Joule หรือ J) เป็นหน่วยมาตรฐานสากลของทั้งงานและพลังงาน"},
{q:"สูตรของแรงตามกฎข้อที่สองของนิวตันคืออะไร?",a:["F = m × a","F = m × v","F = v × t","F = m ÷ t"],correct:0, exp:"กฎการเคลื่อนที่ข้อที่ 2 ของนิวตัน กล่าวว่า แรงลัพธ์ = มวล × ความเร่ง (F = ma)"},
{q:"หน่วยของความดันคืออะไร?",a:["Pascal","Newton","Joule","Volt"],correct:0, exp:"ปาสกาล (Pascal หรือ Pa) เป็นหน่วยของความดัน เท่ากับแรง 1 นิวตันที่กระทำตั้งฉากบนพื้นที่ 1 ตารางเมตร"},
{q:"สูตรคำนวณกำลังคือข้อใด?",a:["งาน ÷ เวลา","แรง ÷ เวลา","ระยะทาง ÷ เวลา","พลังงาน × เวลา"],correct:0, exp:"กำลัง (Power) คือปริมาณงานที่ทำได้ในหนึ่งหน่วยเวลา หรือ P = W/t"},
{q:"ความเร็วของแสงในสุญญากาศประมาณเท่าไร?",a:["3×10^8 m/s","3×10^5 m/s","300 m/s","30 m/s"],correct:0, exp:"ความเร็วแสงในสุญญากาศมีค่าคงที่ประมาณ 300,000,000 เมตร/วินาที หรือ 3×10^8 m/s"},
{q:"หน่วยของกระแสไฟฟ้าคืออะไร?",a:["Ampere","Volt","Ohm","Watt"],correct:0, exp:"แอมแปร์ (Ampere หรือ A) เป็นหน่วยวัดปริมาณกระแสไฟฟ้าที่ไหลผ่านวงจร"},
{q:"แรงเสียดทานมีผลต่อการเคลื่อนที่อย่างไร?",a:["ทำให้วัตถุเคลื่อนที่ช้าลง","ทำให้วัตถุเร็วขึ้น","ทำให้วัตถุหนักขึ้น","ทำให้วัตถุเบาลง"],correct:0, exp:"แรงเสียดทานมีทิศทางตรงข้ามกับการเคลื่อนที่เสมอ จึงทำให้วัตถุเคลื่อนที่ช้าลงหรือหยุดนิ่ง"},
{q:"เสียงเดินทางเร็วที่สุดในตัวกลางชนิดใด?",a:["ของแข็ง","ของเหลว","อากาศ","สุญญากาศ"],correct:0, exp:"เสียงเป็นคลื่นกลที่ต้องอาศัยตัวกลาง และจะเดินทางผ่านของแข็งได้เร็วที่สุดเพราะโมเลกุลของของแข็งอยู่ชิดกันมากที่สุดทำให้ถ่ายโอนพลังงานได้ไว"},
{q:"ความเร่งหมายถึงอะไร?",a:["การเปลี่ยนแปลงของความเร็ว","การเปลี่ยนแปลงของมวล","การเปลี่ยนแปลงของแรง","การเปลี่ยนแปลงของเวลา"],correct:0, exp:"ความเร่ง (Acceleration) คืออัตราการเปลี่ยนแปลงความเร็วของวัตถุในช่วงเวลาหนึ่ง"},
{q:"แม่เหล็กสามารถดูดโลหะชนิดใดได้ดีที่สุด?",a:["เหล็ก","ทอง","เงิน","ไม้"],correct:0, exp:"แม่เหล็กจะดึงดูดสารแม่เหล็ก (Ferromagnetic materials) ได้ดี ซึ่งได้แก่ เหล็ก นิกเกิล และโคบอลต์"},
{q:"หน่วยของความถี่คืออะไร?",a:["Hertz","Newton","Volt","Watt"],correct:0, exp:"เฮิรตซ์ (Hertz หรือ Hz) เป็นหน่วยของความถี่ บ่งบอกถึงจำนวนรอบการสั่นที่เกิดขึ้นในหนึ่งวินาที"},
{q:"คลื่นกลต้องอาศัยอะไรในการเคลื่อนที่?",a:["ตัวกลาง","อากาศ","น้ำ","สุญญากาศ"],correct:0, exp:"คลื่นกล (เช่น คลื่นน้ำ คลื่นเสียง) จำเป็นต้องอาศัยอนุภาคของตัวกลางในการถ่ายโอนพลังงาน ไม่สามารถเคลื่อนที่ผ่านสุญญากาศได้"},
{q:"ความยาวคลื่นคือระยะระหว่างอะไร?",a:["ยอดคลื่นถึงยอดคลื่นถัดไป","ความสูงของคลื่น","ช่วงเวลา","แรงของคลื่น"],correct:0, exp:"ความยาวคลื่น (Wavelength) คือระยะทางระหว่างจุดที่เฟสตรงกันของคลื่นที่อยู่ถัดกัน เช่น วัดจากสันคลื่นหนึ่งไปยังอีกสันคลื่นหนึ่ง"},
{q:"วงจรไฟฟ้าจะทำงานได้เมื่อใด?",a:["เมื่อวงจรปิด","เมื่อวงจรเปิด","เมื่อไม่มีสายไฟ","เมื่อวงจรแตก"],correct:0, exp:"วงจรไฟฟ้าทำงานได้เมื่อเป็น 'วงจรปิด' (Closed circuit) คือมีการเชื่อมต่อกันครบวงจร ทำให้กระแสไฟฟ้าไหลจากขั้วบวกไปขั้วลบได้"},
{q:"แรงแม่เหล็กสามารถเกิดจากสิ่งใด?",a:["กระแสไฟฟ้า","เสียง","แสง","ความร้อน"],correct:0, exp:"เมื่อมีกระแสไฟฟ้าไหลผ่านเส้นลวดตัวนำ จะเหนี่ยวนำให้เกิดสนามแม่เหล็กรอบๆ เส้นลวดนั้น (แม่เหล็กไฟฟ้า)"},
{q:"ถ้าแรงลัพธ์ที่กระทำต่อวัตถุเป็นศูนย์ วัตถุจะเป็นอย่างไร?",a:["หยุดนิ่งหรือเคลื่อนที่ด้วยความเร็วคงที่","เคลื่อนที่เร็วขึ้น","เคลื่อนที่ช้าลง","หยุดทันที"],correct:0, exp:"ตามกฎข้อที่ 1 ของนิวตัน (กฎความเฉื่อย) หากไม่มีแรงลัพธ์มากระทำ วัตถุที่อยู่นิ่งจะอยู่นิ่งต่อไป และวัตถุที่เคลื่อนที่จะเคลื่อนที่ด้วยความเร็วคงที่"},
{q:"พลังงานจลน์ขึ้นอยู่กับปัจจัยใด?",a:["มวลและความเร็ว","เวลา","แรง","อุณหภูมิ"],correct:0, exp:"พลังงานจลน์ (Kinetic energy) หาได้จากสูตร Ek = 1/2 mv² จึงขึ้นอยู่กับมวล (m) และความเร็ว (v) ของวัตถุ"},
{q:"พลังงานศักย์โน้มถ่วงขึ้นอยู่กับอะไร?",a:["ความสูงของวัตถุ","เวลา","แรง","อุณหภูมิ"],correct:0, exp:"พลังงานศักย์โน้มถ่วง (Ep = mgh) ขึ้นอยู่กับมวลของวัตถุ, ความเร่งเนื่องจากแรงโน้มถ่วง, และความสูงจากระดับอ้างอิง"},
{q:"แรงโน้มถ่วงคือแรงประเภทใด?",a:["แรงดึงดูดระหว่างมวล","แรงผลัก","แรงแม่เหล็ก","แรงไฟฟ้า"],correct:0, exp:"แรงโน้มถ่วง (Gravity) เป็นแรงดึงดูดที่เกิดขึ้นระหว่างมวลของวัตถุทุกชนิดในเอกภพ เช่น แรงที่โลกดึงดูดตัวเรา"},
{q:"หน่วยของกำลังไฟฟ้าคืออะไร?",a:["Watt","Volt","Ampere","Ohm"],correct:0, exp:"วัตต์ (Watt) เป็นหน่วยวัดกำลังไฟฟ้า หมายถึงอัตราพลังงานไฟฟ้าที่อุปกรณ์นั้นใช้ไปในหนึ่งหน่วยเวลา"},
{q:"กระแสไฟฟ้าคือการเคลื่อนที่ของอะไร?",a:["อิเล็กตรอน","โปรตอน","นิวตรอน","อะตอม"],correct:0, exp:"กระแสไฟฟ้าในโลหะตัวนำ เกิดจากการเคลื่อนที่ของอิเล็กตรอนอิสระจากศักย์ไฟฟ้าต่ำไปยังศักย์ไฟฟ้าสูง"}
]
